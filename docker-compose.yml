version: '3.8'

services:
  video-generator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL__DEVICE=cuda
      - MODEL__TORCH_DTYPE=float16
      - API__HOST=0.0.0.0
      - API__PORT=8000
      - API__WORKERS=1
      - STORAGE__OUTPUT_DIR=/app/outputs
      - STORAGE__CACHE_DIR=/app/cache
    volumes:
      - ./outputs:/app/outputs
      - ./cache:/app/cache
      - ./temp:/app/temp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  video-generator-cpu:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - MODEL__DEVICE=cpu
      - API__HOST=0.0.0.0
      - API__PORT=8000
      - STORAGE__OUTPUT_DIR=/app/outputs
      - STORAGE__CACHE_DIR=/app/cache
    volumes:
      - ./outputs:/app/outputs
      - ./cache:/app/cache
      - ./temp:/app/temp
    restart: unless-stopped